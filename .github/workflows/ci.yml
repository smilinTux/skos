name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: python -m pip install --upgrade pip && pip install ruff

      # Baseline lint: fail only on real errors (syntax, undefined names,
      # unused imports). Style-only findings are reported but non-blocking.
      - name: Ruff (errors)
        run: ruff check --select=E9,F63,F7,F82,F401 src tests

      - name: Ruff (full, advisory)
        run: ruff check src tests
        continue-on-error: true
