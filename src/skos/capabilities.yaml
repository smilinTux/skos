# skos capability catalog — sk* ports grouped by the 4 C's. Adapters from the 2026-06-09 capability map.
capabilities:
  # ── cloud ──
  - {name: skfence,  group: cloud,   description: "Edge / ingress / reverse proxy",        default: traefik,        alternates: [caddy, envoy-gateway]}
  - {name: skmesh,   group: cloud,   description: "Overlay mesh / tunnels",                default: netbird,        alternates: [headscale, tailscale, pangolin, cloudflared]}
  - {name: skdns,    group: cloud,   description: "DNS authoritative + resolver/filter",   default: powerdns,       alternates: [adguard-home, cloudflare]}
  - {name: skcicd,   group: cloud,   description: "CI/CD",                                 default: argocd,         alternates: [ansible, flux]}
  - {name: skinfra,  group: cloud,   description: "Infra provisioning",                   default: opentofu,       alternates: [terraform, pulumi]}
  - {name: skdweb,   group: cloud,   description: "Decentralized availability + naming",  default: ipfs,           alternates: [ipfs-cluster, ens, handshake]}
  # ── comms ──
  - {name: skcomms,  group: comms,   description: "Multi-channel transport",              default: skcomms,        alternates: []}
  - {name: skchat,   group: comms,   description: "Chat / federation",                    default: matrix,         alternates: [xmpp, nostr]}
  - {name: skvoice,  group: comms,   description: "Voice / video RTC",                    default: livekit,        alternates: [mediasoup, janus]}
  - {name: skbus,    group: comms,   description: "Machine A2A event bus",                default: nats,           alternates: [redpanda]}
  # ── compute ──
  - {name: skdata,   group: compute, description: "Relational+vector+graph+search",       default: postgres,       alternates: [arcadedb]}
  - {name: skcache,  group: compute, description: "Cache / KV",                           default: valkey,         alternates: [dragonflydb]}
  - {name: skobject, group: compute, description: "Object / S3",                          default: garage,         alternates: [seaweedfs]}
  - {name: skfiles,  group: compute, description: "Files / sync",                         default: nextcloud,      alternates: [seafile, syncthing]}
  - {name: skmodel,  group: compute, description: "LLM / inference serving",              default: ollama,         alternates: [vllm, llama-cpp]}
  - {name: skflow,   group: compute, description: "Automation / workflow",                default: n8n,            alternates: [windmill, temporal]}
  - {name: skmon,    group: compute, description: "Observability (metrics/logs/traces)",  default: grafana-stack,  alternates: [signoz]}
  - {name: skpulse,  group: compute, description: "Uptime / status",                      default: uptime-kuma,    alternates: []}
  - {name: skbackup, group: compute, description: "Backup",                               default: restic,         alternates: [kopia, borg]}
  # ── core ──
  - {name: capauth,  group: core,    description: "Sovereign PGP identity",               default: capauth,        alternates: []}
  - {name: skmemory, group: core,    description: "Sovereign agent memory (skmemory)",    default: skmemory,       alternates: []}
  - {name: gtd-ingest, group: core,  description: "Unified GTD capture — sources as adapters", default: itil,       alternates: [email, cron, telegram, voice, calendar]}
  - {name: sksso,    group: core,    description: "Identity / SSO",                       default: authentik,      alternates: [zitadel]}
  - {name: sksec,    group: core,    description: "Threat defense",                       default: crowdsec,       alternates: [falco, wazuh, suricata]}
  - {name: skwaf,    group: core,    description: "Web app firewall",                     default: coraza,         alternates: [bunkerweb]}
  - {name: skca,     group: core,    description: "Internal PKI / mTLS",                  default: step-ca,        alternates: []}
  - {name: skvault,  group: core,    description: "Secret resolution",                    default: vault-file,     alternates: [capauth, hashicorp-vault]}
